# SiteCrew — Nginx reverse proxy for sitecrew.uk
# Install: see deploy/DOMAIN-SETUP.md

upstream sitecrew_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream sitecrew_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name sitecrew.uk www.sitecrew.uk admin.sitecrew.uk;

    # Let's Encrypt HTTP-01 challenge (certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        if ($host = www.sitecrew.uk) {
            return 301 https://sitecrew.uk$request_uri;
        }
        if ($host = admin.sitecrew.uk) {
            return 301 https://admin.sitecrew.uk$request_uri;
        }
        return 301 https://sitecrew.uk$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sitecrew.uk;

    # Certbot will populate these paths on first run:
    ssl_certificate     /etc/letsencrypt/live/sitecrew.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitecrew.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sitecrew.uk$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sitecrew.uk;

    ssl_certificate     /etc/letsencrypt/live/sitecrew.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitecrew.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12M;

    # Backend API (Express on port 4000)
    location /api/ {
        proxy_pass http://sitecrew_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Uploaded media (served by frontend or API — frontend is enough)
    location /uploads/ {
        proxy_pass http://sitecrew_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Frontend (Express + EJS on port 3000)
    location / {
        proxy_pass http://sitecrew_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.sitecrew.uk;

    ssl_certificate     /etc/letsencrypt/live/sitecrew.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitecrew.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12M;

    location /api/ {
        proxy_pass http://sitecrew_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /uploads/ {
        proxy_pass http://sitecrew_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://sitecrew_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
